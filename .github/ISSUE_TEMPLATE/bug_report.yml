name: Bug Report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the problem...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: The exact commands or steps to trigger the bug.
      placeholder: |
        1. Run `linearis issues list --team Backend`
        2. See error output...
      render: shell
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Actual output
      description: Paste the JSON output or error message.
      render: json
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Linearis version
      description: Output of `linearis --version`
      placeholder: "2025.12.3"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v22.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: dropdown
    id: auth-method
    attributes:
      label: Authentication method
      description: How are you providing the API token?
      options:
        - ~/.linearis/token (linearis auth login)
        - LINEAR_API_TOKEN environment variable
        - --api-token flag
        - ~/.linear_api_token (legacy)
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, related issues, workarounds you've tried.
    validations:
      required: false
