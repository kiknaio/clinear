# ------------------------------------------------------------
# GraphQL queries for Linear project milestones
#
# These fragments define reusable field selections for Linear entities,
# ensuring consistent data structure and reducing duplication.
# ------------------------------------------------------------

# List project milestones in a project
#
# Fetches a list of project milestones for a given project.
query ListProjectMilestones($projectId: String!, $first: Int!, $after: String) {
  project(id: $projectId) {
    id
    name
    projectMilestones(first: $first, after: $after) {
      nodes {
        id
        name
        description
        targetDate
        sortOrder
        createdAt
        updatedAt
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

# Get single project milestone by ID with full issue details
#
# Fetches a single project milestone by its unique identifier.
query GetProjectMilestoneById($id: String!, $issuesFirst: Int) {
  projectMilestone(id: $id) {
    id
    name
    description
    targetDate
    sortOrder
    createdAt
    updatedAt
    project {
      id
      name
    }
    issues(first: $issuesFirst) {
      nodes {
        ...CompleteIssueFields
      }
    }
  }
}

# Find project milestone by name within project context (scoped lookup)
#
# Searches for a project milestone by name within a specific project.
query FindProjectMilestoneScoped($name: String!, $projectId: String!) {
  project(id: $projectId) {
    projectMilestones(filter: { name: { eq: $name } }, first: 10) {
      nodes {
        id
        name
        targetDate
        sortOrder
        project {
          id
          name
        }
      }
    }
  }
}

# Find project milestone by name globally (fallback)
#
# Searches for a project milestone by name across all projects.
query FindProjectMilestoneGlobal($name: String!) {
  projectMilestones(filter: { name: { eq: $name } }, first: 10) {
    nodes {
      id
      name
      targetDate
      sortOrder
      project {
        id
        name
      }
    }
  }
}
