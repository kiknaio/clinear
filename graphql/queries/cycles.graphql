# ------------------------------------------------------------
# GraphQL queries for Linear cycles
#
# Cycles are time-boxed iterations (sprints) belonging to teams.
# Each team can have one active cycle at a time, plus past and future
# cycles. Cycles are numbered sequentially per team (Cycle 1, 2, 3...)
# and can have custom names.
#
# Key behavior:
# - isActive, isNext, isPrevious are mutually exclusive flags
# - Only one cycle per team can have isActive=true at any time
# - Cycle.name is nullable - use "Cycle {number}" as fallback
# - Issues can belong to exactly one cycle
# ------------------------------------------------------------

# Cycle fields fragment
#
# Defines the basic fields for a cycle entity. Number is sequential
# per team, startsAt/endsAt are ISO 8601 timestamps.
fragment CycleFields on Cycle {
  id
  number
  name
  startsAt
  endsAt
  isActive
  isNext
  isPrevious
}

# Cycle with issues fragment
#
# Extends CycleFields to include issues belonging to the cycle.
# Issues are paginated - use $first variable to control limit.
fragment CycleWithIssuesFields on Cycle {
  ...CycleFields
  issues(first: $first) {
    nodes {
      id
      identifier
      title
      state {
        name
      }
    }
  }
}

# List cycles with optional filtering
#
# Fetches a list of cycles with optional team and status filtering.
# Without filters, returns cycles from all teams.
#
# Common filters:
#   { team: { id: { eq: "uuid" } } } - cycles for specific team
#   { isActive: { eq: true } } - only active cycles
#
# Variables:
#   $first: Maximum number of cycles to return (default: 50)
#   $filter: Optional CycleFilter for team/status filtering
query GetCycles($first: Int = 50, $after: String, $filter: CycleFilter) {
  cycles(first: $first, after: $after, filter: $filter) {
    nodes {
      ...CycleFields
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

# Get cycle by ID with its issues
#
# Fetches a single cycle by UUID and includes its issues.
# Use this for cycle detail views where issue list is needed.
#
# Variables:
#   $id: Cycle UUID (String! not ID! due to Linear API quirk)
#   $first: Maximum number of issues to return (default: 50)
query GetCycleById($id: String!, $first: Int = 50) {
  cycle(id: $id) {
    ...CycleWithIssuesFields
  }
}

# Find a cycle by name scoped to a team
#
# Resolves a cycle name to UUID within a specific team context.
# Used when resolving human-friendly identifiers like "Sprint 1".
# Returns up to 10 matches (typically only 1).
#
# Variables:
#   $name: Cycle name to search for (case-sensitive)
#   $teamId: Team UUID to scope the search
query FindCycleScoped($name: String!, $teamId: ID!) {
  cycles(
    filter: {
      and: [{ name: { eq: $name } }, { team: { id: { eq: $teamId } } }]
    }
    first: 10
  ) {
    nodes {
      id
      name
      number
      startsAt
      isActive
      isNext
      isPrevious
      team {
        id
        key
      }
    }
  }
}

# Find a cycle by name across all teams
#
# Resolves a cycle name to UUID globally (not team-scoped).
# Used when team context is not available. May return multiple
# matches if multiple teams have cycles with the same name.
#
# Variables:
#   $name: Cycle name to search for (case-sensitive)
query FindCycleGlobal($name: String!) {
  cycles(filter: { name: { eq: $name } }, first: 10) {
    nodes {
      id
      name
      number
      startsAt
      isActive
      isNext
      isPrevious
      team {
        id
        key
      }
    }
  }
}
